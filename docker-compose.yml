services:
  certs:
    image: alpine:3.20
    container_name: rts-certs
    volumes:
      - ./nginx/certs:/certs
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache openssl >/dev/null && if [ ! -f /certs/server.crt ] || [ ! -f /certs/server.key ]; then openssl req -x509 -nodes -newkey rsa:2048 -days 365 -subj \"/CN=localhost\" -keyout /certs/server.key -out /certs/server.crt; fi",
      ]

  app:
    build:
      context: .
      target: runtime
    container_name: rts-app
    restart: unless-stopped
    volumes:
      - ./nginx/certs:/etc/nginx/certs:ro
    environment:
      GO_ENV: production
      DATABASE_URL: postgres://${POSTGRES_USER:-rts_user}:${POSTGRES_PASSWORD:-rts_password}@postgres-primary:5432/${POSTGRES_DB:-rts_db}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      WEBHOOK_CERT: /etc/nginx/certs/server.crt
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
    mem_limit: 256m
    cpus: 0.50
    networks:
      - frontend
      - backend
    depends_on:
      certs:
        condition: service_completed_successfully
      postgres-primary:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres-primary:
    image: postgres:15
    container_name: rts-postgres-primary
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rts_password}
      POSTGRES_DB: ${POSTGRES_DB:-rts_db}
    volumes:
      - postgres-primary-data:/var/lib/postgresql/data
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.00
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rts_user -d rts_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  postgres-replica:
    profiles: ["ha"]
    image: postgres:15
    container_name: rts-postgres-replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rts_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rts_password}
      POSTGRES_DB: ${POSTGRES_DB:-rts_db}
    volumes:
      - postgres-replica-data:/var/lib/postgresql/data
    networks:
      - backend

  pgpool:
    profiles: ["ha"]
    image: bitnami/pgpool:4
    container_name: rts-pgpool
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_started
    environment:
      PGPOOL_BACKEND_NODES: "0:postgres-primary:5432,1:postgres-replica:5432"
      PGPOOL_SR_CHECK_USER: ${POSTGRES_USER:-rts_user}
      PGPOOL_SR_CHECK_PASSWORD: ${POSTGRES_PASSWORD:-rts_password}
      PGPOOL_POSTGRES_USERNAME: ${POSTGRES_USER:-rts_user}
      PGPOOL_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rts_password}
      PGPOOL_ADMIN_USERNAME: ${PGPOOL_ADMIN_USERNAME:-rts_admin}
      PGPOOL_ADMIN_PASSWORD: ${PGPOOL_ADMIN_PASSWORD:-rts_admin_password}
      PGPOOL_ENABLE_LOAD_BALANCING: "yes"
      PGPOOL_ENABLE_STATEMENT_LOAD_BALANCING: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U rts_user -d rts_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  redis:
    image: redis:7
    container_name: rts-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.50
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend

  nginx:
    image: nginx:1.27
    container_name: rts-nginx
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    depends_on:
      certs:
        condition: service_completed_successfully
      app:
        condition: service_started
    ports:
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - frontend
      - backend

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.53.1
    container_name: rts-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - backend

  postgres-exporter:
    profiles: ["observability"]
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: rts-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgres://${POSTGRES_USER:-rts_user}:${POSTGRES_PASSWORD:-rts_password}@postgres-primary:5432/${POSTGRES_DB:-rts_db}?sslmode=disable
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - backend

  grafana:
    profiles: ["observability"]
    image: grafana/grafana-oss:11.1.0
    container_name: rts-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - backend

volumes:
  postgres-primary-data:
  postgres-replica-data:
  redis-data:
  grafana-data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
